<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-cover bg-center" style="background-image: url('/static/image/forest.jpeg');">

  <div class="min-h-screen w-full bg-black/10 flex items-center justify-center backdrop-blur-lg px-4 py-8">

    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-md border border-white/20">

      <!-- Title -->
      <h1 class="text-2xl md:text-3xl font-bold text-green-100 text-center italic">FloraCure</h1>
      <p class="text-green-50 text-center mb-5 md:mb-6 italic text-sm md:text-base">Create your account to enter the world of plant care</p>

      <!-- Error -->
      {% if error %}
      <div class="bg-red-100 text-red-600 font-semibold py-2 px-4 rounded-xl mb-4 text-center text-sm">
        ⚠️ {{ error }}
      </div>
      {% endif %}

      <!-- Register Form -->
      <form method="POST" action="register" class="space-y-4 md:space-y-5">
        {% csrf_token %}

        <!-- Full Name -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Full Name</label>
          <input type="text" name="full_name" required
                 class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm md:text-base">
        </div>

        <!-- Email -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Email</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm md:text-base">
        </div>

        <!-- Password with show/hide -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Password</label>
        
            <input type="password" name="password" id="password" required
                   class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm md:text-base pr-12">
            
        
        </div>

        <!-- Submit -->
        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 text-white font-semibold py-3 rounded-lg shadow-lg transition transform hover:scale-103 text-sm md:text-base">
          Create Account
        </button>
      </form>

      <!-- Login Link -->
      <p class="text-green-100 text-sm text-center mt-4">
        Already have an account?
        <a href="login" class="underline hover:text-green-300 font-semibold">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
