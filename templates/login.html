<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-cover bg-center" style="background-image: url('/static/image/forest.jpeg');">

  <!-- Overlay with blur -->
  <div class="h-screen w-full flex items-center justify-center backdrop-blur-lg bg-black/10">
    
    <!-- Login Card -->
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-8 w-full max-w-md border border-white/20">
      
      <!-- Title -->
      <h1 class="text-3xl font-bold text-green-100 italic text-center">FloraCure</h1>
      <p class="text-green-50 text-center mb-6 italic">Sign in to your account to continue</p>
      
      <!-- Login Form -->
      <form method="POST" action="login" class="space-y-5">
        {% csrf_token %}
        
        <!-- Username -->
  <div>
    <label class="block text-green-100 text-sm mb-1">Username</label>
    <input type="text" name="username" required
           class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400"
           placeholder="">
  </div>
  
        <!-- Email -->
        <!-- <div>
          <label class="block text-green-100 text-sm mb-1">Email</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400">
        </div> -->
        
        <!-- Password -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Password</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-2 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400">
        </div>
        
        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 text-white font-semibold py-2 rounded-lg shadow-lg transition transform hover:scale-103">
           
          Sign In
        </button>
      </form>
      
      <!-- Register Link -->
      <p class="text-green-100 text-sm text-center mt-4">
        Don’t have an account? 
        <a href="register" class="underline hover:text-green-300">Register here</a>
      </p>
    </div>
  </div>

</body>
</html>
