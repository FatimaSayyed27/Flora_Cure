<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cover bg-center" style="background-image: url('/static/image/forest.jpeg');">

  <div class="min-h-screen w-full flex items-center justify-center backdrop-blur-lg bg-black/10 px-4 py-8">

    <!-- Login Card -->
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-md border border-white/20">

      <!-- Title -->
      <h1 class="text-2xl md:text-3xl font-bold text-green-100 italic text-center">FloraCure</h1>
      <p class="text-green-50 text-center mb-6 italic text-sm md:text-base">Sign in to your account to continue</p>

      {% if error %}
        <div class="bg-red-100 text-red-600 font-semibold py-2 px-4 rounded-xl mb-4 text-center text-sm">
          ⚠️ {{ error }}
        </div>
      {% endif %}

      <!-- Login Form -->
      <form method="POST" action="login" class="space-y-4 md:space-y-5">
        {% csrf_token %}

        <!-- Username -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Username</label>
          <input type="text" name="username" required
                 class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm md:text-base">
        </div>

        <!-- Password -->
        <div>
          <label class="block text-green-100 text-sm mb-1">Password</label>
          <div class="relative">
            <input type="password" name="password" id="password" required
                   class="w-full px-4 py-3 rounded-lg bg-white/20 text-white placeholder-green-200 focus:outline-none focus:ring-2 focus:ring-green-400 text-sm md:text-base pr-12">
            <!-- Show/Hide Password -->
            <button type="button" onclick="togglePassword()"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-green-200 hover:text-white transition">
              <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-600 hover:to-emerald-800 text-white font-semibold py-3 rounded-lg shadow-lg transition transform hover:scale-105 text-sm md:text-base">
          Sign In
        </button>
      </form>

      <!-- Register Link -->
      <p class="text-green-100 text-sm text-center mt-4">
        Don't have an account?
        <a href="register" class="underline hover:text-green-300 font-semibold">Register here</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
