<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cover bg-center" style="background-image: url('/static/image/forest.jpeg');">

  <div class="min-h-screen w-full flex items-center justify-center backdrop-blur-sm px-4">

    <div class="text-center max-w-lg w-full">

      <!-- Logo -->
      <div class="mb-4 flex justify-center">
        <div class="h-16 w-16 md:h-20 md:w-20 bg-white/10 rounded-full flex items-center justify-center border border-white/20 shadow-lg">
          <img src="/static/image/fc.png" alt="Logo" class="h-10 w-10 md:h-12 md:w-12">
        </div>
      </div>

      <!-- Heading -->
      <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold italic text-green-100 mb-2 drop-shadow-lg">
        Welcome to FloraCure
      </h1>

      <!-- Tagline -->
      <p class="italic text-sm md:text-base text-green-50 mb-8 leading-relaxed">
        "Your AI-powered plant doctor"
      </p>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="login"
           class="bg-gradient-to-r from-emerald-500 to-emerald-700
                  hover:from-emerald-600 hover:to-emerald-800
                  text-white font-semibold px-10 py-3 rounded-full
                  shadow-lg transition transform hover:scale-105 text-sm md:text-base">
          Login
        </a>
        <a href="register"
           class="bg-white/10 hover:bg-white/20 border border-white/30
                  text-white font-semibold px-10 py-3 rounded-full
                  shadow-lg transition transform hover:scale-105 text-sm md:text-base backdrop-blur-sm">
          Register
        </a>
      </div>

      <!-- Footer text -->
      <p class="text-green-200 text-xs mt-8 opacity-70">
        &copy; 2026 FloraCure — Dedicated to healthy plants 🌿
      </p>
    </div>
  </div>

</body>
</html>
