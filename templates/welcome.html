<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | FloraCure</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen bg-cover bg-center" style="background-image: url('/static/image/forest.jpeg');">

  <!-- Full screen overlay with blur -->
  <div class="h-screen w-full  flex items-center justify-center backdrop-blur-sm">
    
    <!-- Glassmorphism card -->
    <div class=" p-10 text-center max-w-lg ">
      
      <!-- Heading -->
      <h1 class="text-4xl font-bold italic text-green-100 mb-1 drop-shadow-lg">
        Welcome to FloraCure
      </h1>
      
      <!-- Message -->
      <p class="italic text-sm text-green-50 mb-8 leading-relaxed">
    "Your AI-powered plant doctor"
      </p>

      <!-- Login button -->
      <a href="login" 
         class="bg-gradient-to-r from-emerald-500 to-emerald-700 
          hover:from-emerald-600 hover:to-emerald-800 
          text-white font-semibold px-10 py-3 rounded-full 
          shadow-lg transition transform hover:scale-105">
        Login
      </a>
    </div>
  </div>

</body>
</html>
